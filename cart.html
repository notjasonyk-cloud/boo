<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart - RiftCheats</title>
    <link rel="icon" type="image/png" href="/assets/197035/logo.png?v=2026">
    <meta name="theme-color" content="#ec4899" />
    
    <link href="/assets/197035/built.css?v=1770372364948" rel="stylesheet"/>
    <link href="/assets/197035/custom.css?v=1782526667289" rel="stylesheet"/>
    
    <style>
      :root {
        --cl-accent: 236,72,153;
        --cl-background: 3,7,18;
        --cl-t-primary: 255,255,255;
      }
      body {
        font-family: 'Geist', sans-serif;
        background-color: #030712;
        color: #ffffff;
        overflow-x: hidden;
      }
      .cart-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      }
      .cart-card:hover {
        border-color: rgba(236, 72, 153, 0.3);
      }
      .summary-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(16px);
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="text-t-primary min-h-screen flex flex-col justify-between bg-[#030712]">
    
    <div id="app" x-data="cartPage">
      
      <!-- Navbar Header -->
      <header class="fixed top-0 inset-x-0 z-50 bg-[#030712]/80 backdrop-blur-2xl border-b border-white/5">
        <nav class="mx-auto max-w-7xl px-4 sm:px-6 h-20 flex justify-between items-center">
          <a href="/" class="flex items-center gap-3">
            <img src="/assets/197035/logo.png?v=2026" alt="RiftCheats" class="h-9 w-auto rounded-md" />
          </a>
          <div class="flex items-center gap-6 font-medium text-sm">
            <a href="/" class="text-white/70 hover:text-white transition">Home</a>
            <a href="/#products" class="text-white/70 hover:text-white transition">Products</a>
            <a href="/status" class="text-white/70 hover:text-white transition">Status</a>
          </div>
        </nav>
      </header>

      <!-- Main Cart Content -->
      <main class="pt-32 pb-24 max-w-7xl mx-auto px-4 sm:px-6 w-full">
        
        <div class="mb-10">
          <h1 class="text-3xl sm:text-5xl font-extrabold tracking-tight text-white">
            Shopping Cart
          </h1>
          <p class="text-white/50 text-sm mt-2">Review your items and proceed to secure checkout</p>
        </div>

        <!-- Empty Cart View -->
        <template x-if="items.length === 0">
          <div class="p-12 sm:p-16 cart-card rounded-2xl text-center flex flex-col items-center gap-5">
            <div class="size-16 rounded-2xl bg-accent-500/10 border border-accent-500/20 flex items-center justify-center text-accent-500">
              <svg xmlns="http://www.w3.org/2000/svg" class="size-8" viewBox="0 0 24 24"><path fill="currentColor" d="M7 22q-.825 0-1.412-.587T5 20t.588-1.412T7 18t1.413.588T9 20t-.587 1.413T7 22m10 0q-.825 0-1.412-.587T15 20t.588-1.412T17 18t1.413.588T19 20t-.587 1.413T17 22M6.15 6l2.4 5h7l2.75-5zM5.2 4h14.75q.575 0 .875.513t.025 1.037l-3.55 6.4q-.275.5-.737.775T15.55 13H8.1L7 15h11q.425 0 .713.288T19 16t-.288.713T18 17H7q-1.125 0-1.7-.987t-.05-1.963L6.6 11.6L3 4H2q-.425 0-.712-.288T1 3t.288-.712T2 2h1.625q.275 0 .525.15t.375.425zm3.35 7h7z"/></svg>
            </div>
            <p class="text-xl font-bold text-white">Your cart is currently empty</p>
            <p class="text-sm text-white/50 -mt-2">Select a product from our store to add it to your cart</p>
            <a href="/#products" class="mt-2 px-6 py-3 rounded-xl bg-accent-500 hover:bg-accent-600 font-bold text-white transition-all duration-300 shadow-lg shadow-accent-500/25">
              Browse Products
            </a>
          </div>
        </template>

        <!-- Cart Items & Summary Layout -->
        <template x-if="items.length > 0">
          <div class="flex flex-col lg:flex-row gap-8 items-start">
            
            <!-- Items List -->
            <div class="w-full lg:w-[65%] flex flex-col gap-4">
              <template x-for="(item, index) in items" :key="item.variantId">
                <div class="p-4 sm:p-6 cart-card rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-6 transition-all duration-300">
                  
                  <div class="flex items-center gap-5 w-full sm:w-auto">
                    <!-- Product Image Container -->
                    <div class="w-20 h-24 sm:w-24 sm:h-28 rounded-xl border border-white/10 bg-black/60 flex items-center justify-center p-1.5 shrink-0 overflow-hidden">
                      <img :src="item.image" :alt="item.name" class="h-full w-auto object-contain drop-shadow-md" />
                    </div>
                    
                    <!-- Details -->
                    <div class="flex flex-col">
                      <h3 class="text-lg font-bold text-white leading-snug" x-text="item.name"></h3>
                      <div class="flex items-center gap-2 mt-1.5">
                        <span class="px-2.5 py-0.5 rounded-md text-xs font-semibold bg-accent-500/15 text-accent-400 border border-accent-500/30" x-text="item.variantName"></span>
                      </div>
                      <p class="text-xs text-white/50 mt-2">Unit Price: <span class="text-white font-semibold" x-text="formatCurrency(item.unitPrice)"></span></p>
                    </div>
                  </div>

                  <!-- Controls & Price -->
                  <div class="flex items-center justify-between sm:justify-end gap-6 w-full sm:w-auto border-t sm:border-t-0 pt-4 sm:pt-0 border-white/10">
                    <!-- Quantity Buttons -->
                    <div class="flex items-center gap-2 bg-white/5 border border-white/10 rounded-xl p-1">
                      <button @click="updateQty(index, item.quantity - 1)" type="button" class="size-8 flex justify-center items-center hover:bg-white/10 rounded-lg text-white font-bold transition">-</button>
                      <span class="px-2 font-bold text-white text-sm min-w-[1.5rem] text-center" x-text="item.quantity"></span>
                      <button @click="updateQty(index, item.quantity + 1)" type="button" class="size-8 flex justify-center items-center hover:bg-white/10 rounded-lg text-white font-bold transition">+</button>
                    </div>

                    <!-- Item Total -->
                    <div class="text-right min-w-[5.5rem]">
                      <p class="text-xl font-extrabold text-white" x-text="formatCurrency(item.unitPrice * item.quantity)"></p>
                    </div>

                    <!-- Delete Button -->
                    <button @click="removeItem(index)" type="button" class="p-2 text-white/30 hover:text-red-400 transition-colors">
                      <svg xmlns="http://www.w3.org/2000/svg" class="size-5" viewBox="0 0 24 24"><path fill="currentColor" d="M7 21q-.825 0-1.412-.587T5 19V6H4q-.425 0-.712-.288T3 5t.288-.712T4 4h4.5q0-.425.288-.712T9.5 3h5q.425 0 .713.288T15.5 4H20q.425 0 .713.288T21 5t-.288.713T20 6h-1v13q0 .825-.587 1.413T17 21zm2-4q0 .425.288.713T10 18t.713-.288T11 17V9q0-.425-.288-.712T10 8t-.712.288T9 9zm4 0q0 .425.288.713T14 18t.713-.288T15 17V9q0-.425-.288-.712T14 8t-.712.288T13 9z"/></svg>
                    </button>
                  </div>

                </div>
              </template>

              <div class="flex justify-between items-center px-1 pt-1">
                <button @click="clearCart" type="button" class="text-xs text-white/40 hover:text-white transition">Clear Cart</button>
                <a href="/#products" class="text-xs text-accent-400 hover:underline">← Continue Shopping</a>
              </div>
            </div>

            <!-- Order Summary Sidebar -->
            <div class="w-full lg:w-[35%]">
              <div class="p-6 summary-card rounded-2xl flex flex-col gap-5 sticky top-28">
                <h2 class="text-xl font-bold text-white border-b border-white/10 pb-3">Order Summary</h2>
                
                <div class="flex justify-between items-center text-sm">
                  <span class="text-white/60">Subtotal</span>
                  <span class="font-bold text-white" x-text="formatCurrency(calculateTotal())"></span>
                </div>

                <div class="flex justify-between items-center text-sm">
                  <span class="text-white/60">Automated Delivery</span>
                  <span class="text-accent-400 font-semibold">Free Instant</span>
                </div>

                <div class="border-t border-white/10 pt-4 flex justify-between items-baseline">
                  <span class="text-base font-bold text-white">Total</span>
                  <span class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white via-accent-300 to-accent-500" x-text="formatCurrency(calculateTotal())"></span>
                </div>

                <!-- Altcha Widget Container -->
                <div class="mt-1">
                  <div x-show="!altchaPayload" class="text-xs text-white/50 mb-2">Security Verification:</div>
                  <altcha-widget
                    challengeurl="https://api-internal-3.sellauth.com/v1/altcha?shop_id=223549"
                    auto="onload"
                    hidefooter="true"
                    hidelogo="true"
                    x-ref="altcha"
                    style="--altcha-max-width: 100%;"
                  ></altcha-widget>
                </div>

                <!-- Checkout Button -->
                <button
                  @click="proceedToCheckout"
                  type="button"
                  :disabled="checkingOut || !altchaPayload"
                  class="w-full py-4 rounded-xl bg-gradient-to-r from-accent-500 to-accent-600 hover:from-accent-600 hover:to-accent-700 disabled:opacity-50 font-bold text-white transition-all duration-300 shadow-lg shadow-accent-500/25 flex justify-center items-center gap-2"
                >
                  <span x-text="checkingOut ? 'Creating Checkout...' : 'Proceed to Checkout »'"></span>
                </button>

                <p x-show="checkoutError" x-text="checkoutError" class="text-xs text-red-400 text-center mt-1"></p>

                <!-- Features -->
                <div class="grid grid-cols-2 gap-3 pt-4 border-t border-white/10 text-xs text-white/60">
                  <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-4 text-accent-400 shrink-0" viewBox="0 0 24 24"><path fill="currentColor" d="M11 21h-1l1-7H7.5c-.58 0-.57-.32-.38-.66c.19-.34.05-.08.07-.12C8.48 10.94 10.42 7.54 13 3h1l-1 7h3.5c.49 0 .56.33.47.51l-.07.15C12.96 17.55 11 21 11 21"/></svg>
                    <span>Instant Key</span>
                  </div>
                  <div class="flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="size-4 text-accent-400 shrink-0" viewBox="0 0 24 24"><path fill="currentColor" d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12c5.16-1.26 9-6.45 9-12V5zm-2 16l-4-4l1.41-1.41L10 14.17l6.59-6.59L18 9z"/></svg>
                    <span>Undetected</span>
                  </div>
                </div>

              </div>
            </div>

          </div>
        </template>

      </main>

      <!-- Footer -->
      <footer class="border-t border-white/5 py-8 text-center text-xs text-white/40">
        <p>© 2026 RiftCheats. All rights reserved.</p>
      </footer>
    </div>

    <!-- Product Catalog Database -->
    <script>
      const CATALOG_MAP = {
        651369: {
          name: "Crusader R6 Cheat",
          image: "https://api.sellauth.com/storage/images/944492.webp",
          variants: { 1026675: { name: "1 Day key", price: 7.49 }, 1026676: { name: "7 Day Key", price: 29.99 }, 1026677: { name: "30 Day Key", price: 59.99 } }
        },
        740833: {
          name: "Krush Rust Cheat",
          image: "https://api.sellauth.com/storage/images/944529.webp",
          variants: { 1210815: { name: "1 Day key", price: 7.49 }, 1210816: { name: "7 Day Key", price: 29.99 }, 1210817: { name: "30 Day Key", price: 59.99 } }
        },
        651363: {
          name: "Krush Apex Cheat",
          image: "https://api.sellauth.com/storage/images/944495.webp",
          variants: { 1026646: { name: "1 Day key", price: 7.49 }, 1026647: { name: "7 Day Key", price: 29.99 }, 1026648: { name: "30 Day Key", price: 59.99 } }
        },
        651348: {
          name: "Krush Arc Cheat",
          image: "https://api.sellauth.com/storage/images/944493.webp",
          variants: { 1026616: { name: "1 Day key", price: 7.49 }, 1026632: { name: "7 Day Key", price: 29.99 }, 1026633: { name: "30 Day Key", price: 59.99 } }
        },
        740821: {
          name: "Disconnect Fortnite Cheat",
          image: "https://api.sellauth.com/storage/images/944503.webp",
          variants: { 1210784: { name: "1 Day key", price: 7.49 }, 1210785: { name: "7 Day Key", price: 29.99 }, 1210786: { name: "30 Day Key", price: 59.99 }, 1360871: { name: "Lifetime", price: 299.99 } }
        },
        740827: {
          name: "Ancient Delta Cheat",
          image: "https://api.sellauth.com/storage/images/944525.webp",
          variants: { 1210803: { name: "1 Day key", price: 7.49 }, 1210804: { name: "7 Day Key", price: 29.99 }, 1210805: { name: "30 Day Key", price: 59.99 } }
        },
        740845: {
          name: "Verse HWID Spoofer",
          image: "https://api.sellauth.com/storage/images/944536.webp",
          variants: { 1210839: { name: "1 Time", price: 29.99 }, 1210842: { name: "Lifetime", price: 99.99 } }
        }
      };

      document.addEventListener('alpine:init', () => {
        Alpine.data('cartPage', () => ({
          items: [],
          altchaPayload: null,
          checkingOut: false,
          checkoutError: '',
          init() {
            let rawItems = [];
            try {
              rawItems = JSON.parse(localStorage.getItem('cart') || '[]');
            } catch (e) {
              rawItems = [];
            }

            this.items = rawItems.map(item => {
              const prod = CATALOG_MAP[item.productId] || {};
              const variant = (prod.variants && prod.variants[item.variantId]) || {};
              return {
                productId: item.productId,
                variantId: item.variantId,
                quantity: item.quantity || 1,
                name: prod.name || (`Product #${item.productId}`),
                image: prod.image || 'https://api.sellauth.com/storage/images/944529.webp',
                variantName: variant.name || 'Key Variant',
                unitPrice: variant.price || 7.49
              };
            });

            this.$nextTick(() => {
              if (this.$refs.altcha) {
                this.$refs.altcha.addEventListener('statechange', (event) => {
                  if (event.detail.state === 'verified') {
                    this.altchaPayload = event.detail.payload;
                  }
                });
              }
            });
          },
          formatCurrency(amt) {
            return '$' + Number(amt).toFixed(2);
          },
          calculateTotal() {
            return this.items.reduce((sum, item) => sum + (item.unitPrice * item.quantity), 0);
          },
          updateQty(index, newQty) {
            if (newQty <= 0) {
              this.removeItem(index);
              return;
            }
            this.items[index].quantity = newQty;
            this.saveToStorage();
          },
          removeItem(index) {
            this.items.splice(index, 1);
            this.saveToStorage();
          },
          clearCart() {
            this.items = [];
            this.saveToStorage();
          },
          saveToStorage() {
            const raw = this.items.map(i => ({ productId: i.productId, variantId: i.variantId, quantity: i.quantity }));
            localStorage.setItem('cart', JSON.stringify(raw));
          },
          async proceedToCheckout() {
            if (this.items.length === 0 || this.checkingOut) return;
            this.checkingOut = true;
            this.checkoutError = '';

            const buyNowCart = this.items.map(item => ({
              productId: item.productId,
              variantId: item.variantId,
              quantity: item.quantity
            }));

            const formData = {
              cart: buyNowCart,
              currency: 'USD',
              shopId: '223549'
            };

            if (this.altchaPayload) {
              formData.altcha = this.altchaPayload;
            }

            try {
              const response = await fetch('https://api-internal-3.sellauth.com/v1/checkout', {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
              });

              const data = await response.json();
              if (data.url) {
                let sessionUrl = data.url;
                let sessionId = sessionUrl;
                if (sessionUrl.includes('/checkout/')) {
                  sessionId = sessionUrl.substring(sessionUrl.indexOf('/checkout/') + 10);
                }
                window.location.href = `https://sellauth.com/checkout/${sessionId}`;
              } else {
                this.checkoutError = data.message || 'Checkout failed. Please try again.';
              }
            } catch (e) {
              this.checkoutError = 'Network error. Please try again.';
            } finally {
              this.checkingOut = false;
            }
          }
        }));
      });
    </script>

    <!-- Altcha ESM Module -->
    <script type="module">
      import { Altcha } from 'https://cdn.jsdelivr.net/npm/altcha@1.2.0/+esm'
    </script>
  </body>
</html>
