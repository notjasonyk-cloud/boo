<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Shopping Cart - RiftCheats</title>
    <link rel="icon" type="image/png" href="/assets/197035/logo.png?v=2026">
    <meta name="theme-color" content="#ec4899" />
    <link href="/assets/197035/built.css?v=1770372364948" rel="stylesheet"/>
    <link href="/assets/197035/custom.css?v=1782526667289" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/fontawesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      :root {
        --cl-accent: 236,72,153;
        --cl-background: 3,7,18;
        --cl-t-primary: 255,255,255;
      }
      body { font-family: 'Geist', sans-serif; background-color: rgb(3,7,18); color: #fff; }
    </style>
  </head>
  <body class="min-h-screen flex flex-col justify-between">
    <div id="app" x-data="cartPage">
      <header class="fixed top-0 inset-x-0 z-20 bg-background/50 backdrop-blur-2xl border-b border-white/5 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
          <a href="/" class="flex items-center gap-3">
            <img src="/assets/197035/logo.png?v=2026" alt="RiftCheats" class="max-h-10 rounded-md">
          </a>
          <div class="flex items-center gap-4">
            <a href="/" class="text-t-primary/80 hover:text-t-primary text-sm font-medium">Home</a>
            <a href="/#products" class="text-t-primary/80 hover:text-t-primary text-sm font-medium">Products</a>
            <a href="/status" class="text-t-primary/80 hover:text-t-primary text-sm font-medium">Status</a>
          </div>
        </div>
      </header>

      <main class="pt-32 pb-20 max-w-5xl mx-auto px-4 w-full">
        <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-text-title mb-8">
          Your Shopping Cart
        </h1>

        <template x-if="items.length === 0">
          <div class="p-12 text-center bg-white/5 border border-white/5 rounded-2xl flex flex-col items-center gap-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-16 text-t-primary/30" viewBox="0 0 24 24"><path fill="currentColor" d="M7 22q-.825 0-1.412-.587T5 20t.588-1.412T7 18t1.413.588T9 20t-.587 1.413T7 22m10 0q-.825 0-1.412-.587T15 20t.588-1.412T17 18t1.413.588T19 20t-.587 1.413T17 22M6.15 6l2.4 5h7l2.75-5zM5.2 4h14.75q.575 0 .875.513t.025 1.037l-3.55 6.4q-.275.5-.737.775T15.55 13H8.1L7 15h11q.425 0 .713.288T19 16t-.288.713T18 17H7q-1.125 0-1.7-.987t-.05-1.963L6.6 11.6L3 4H2q-.425 0-.712-.288T1 3t.288-.712T2 2h1.625q.275 0 .525.15t.375.425zm3.35 7h7z"/></svg>
            <p class="text-xl font-medium text-t-primary/70">Your cart is currently empty.</p>
            <a href="/" class="mt-2 inline-flex items-center px-6 py-3 rounded-xl bg-accent-500 hover:bg-accent-600 text-white font-medium transition">
              Browse Products
            </a>
          </div>
        </template>

        <template x-if="items.length > 0">
          <div class="flex flex-col gap-6">
            <div class="flex flex-col gap-4">
              <template x-for="(item, index) in items" :key="item.variantId">
                <div class="p-4 sm:p-6 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-between gap-4">
                  <div class="flex flex-col min-w-0">
                    <h3 class="text-lg font-semibold text-t-primary" x-text="item.name || ('Product #' + item.productId)"></h3>
                    <p class="text-sm text-accent-500 font-medium" x-text="item.variantName || 'Key Variant'"></p>
                  </div>
                  <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-black/30 rounded-xl p-1 border border-white/5">
                      <button @click="updateQty(index, item.quantity - 1)" class="size-8 flex justify-center items-center hover:bg-white/10 rounded-lg text-t-primary">-</button>
                      <span class="px-3 font-semibold text-t-primary" x-text="item.quantity"></span>
                      <button @click="updateQty(index, item.quantity + 1)" class="size-8 flex justify-center items-center hover:bg-white/10 rounded-lg text-t-primary">+</button>
                    </div>
                    <button @click="removeItem(index)" class="p-2 text-red-400 hover:text-red-300">
                      <svg xmlns="http://www.w3.org/2000/svg" class="size-5" viewBox="0 0 24 24"><path fill="currentColor" d="M7 21q-.825 0-1.412-.587T5 19V6H4q-.425 0-.712-.288T3 5t.288-.712T4 4h4.5q0-.425.288-.712T9.5 3h5q.425 0 .713.288T15.5 4H20q.425 0 .713.288T21 5t-.288.713T20 6h-1v13q0 .825-.587 1.413T17 21zm2-4q0 .425.288.713T10 18t.713-.288T11 17V9q0-.425-.288-.712T10 8t-.712.288T9 9zm4 0q0 .425.288.713T14 18t.713-.288T15 17V9q0-.425-.288-.712T14 8t-.712.288T13 9z"/></svg>
                    </button>
                  </div>
                </div>
              </template>
            </div>

            <div class="p-6 bg-white/5 border border-white/5 rounded-2xl flex flex-col sm:flex-row justify-between items-center gap-4">
              <button @click="clearCart" class="text-sm text-t-primary/50 hover:text-t-primary">Clear Cart</button>
              <button @click="proceedToCheckout" :disabled="checkingOut" class="w-full sm:w-auto px-8 py-3.5 rounded-xl bg-accent-500 hover:bg-accent-600 font-semibold text-white transition flex items-center justify-center gap-2">
                <span x-text="checkingOut ? 'Processing Checkout...' : 'Proceed to Checkout »'"></span>
              </button>
            </div>

            <p x-show="checkoutError" x-text="checkoutError" class="text-red-500 text-sm text-center"></p>
          </div>
        </template>
      </main>
    </div>

    <script>
      document.addEventListener('alpine:init', () => {
        Alpine.data('cartPage', () => ({
          items: [],
          checkingOut: false,
          checkoutError: '',
          init() {
            try {
              this.items = JSON.parse(localStorage.getItem('cart') || '[]');
            } catch (e) {
              this.items = [];
            }
          },
          updateQty(index, newQty) {
            if (newQty <= 0) {
              this.removeItem(index);
              return;
            }
            this.items[index].quantity = newQty;
            localStorage.setItem('cart', JSON.stringify(this.items));
          },
          removeItem(index) {
            this.items.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(this.items));
          },
          clearCart() {
            this.items = [];
            localStorage.removeItem('cart');
          },
          async proceedToCheckout() {
            if (this.items.length === 0 || this.checkingOut) return;
            this.checkingOut = true;
            this.checkoutError = '';

            const buyNowCart = this.items.map(item => ({
              productId: item.productId,
              variantId: item.variantId,
              quantity: item.quantity
            }));

            try {
              const response = await fetch('https://api-internal-3.sellauth.com/v1/checkout', {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ cart: buyNowCart, currency: 'USD', shopId: '223549' })
              });
              const data = await response.json();
              if (data.url) {
                let sessionUrl = data.url;
                let sessionId = sessionUrl;
                if (sessionUrl.includes('/checkout/')) {
                  sessionId = sessionUrl.substring(sessionUrl.indexOf('/checkout/') + 10);
                }
                window.location.href = `https://sellauth.com/checkout/${sessionId}`;
              } else {
                this.checkoutError = data.message || 'Checkout failed. Please try again.';
              }
            } catch (e) {
              this.checkoutError = 'Network error. Please try again.';
            } finally {
              this.checkingOut = false;
            }
          }
        }));
      });
    </script>
  </body>
</html>
